[default]
single_instance = false

# Daemon-Modus: Poll-Intervall in Sekunden wenn keine Jobs gefunden
poll_interval_seconds = 3
# Max Iterationen: 0 = unendlich loopen, >0 = genau so viele Loop-Durchlaeufe
max_iterations = 0

[logging]
console_output = yes
copy_on_error = true

[database]
db_path = data/bpmn_engine.db

[claude_cli]
output_format = stream-json
# UNUSED verbose = true
# model und thinking_level werden pro Actor in actor_config.md definiert

[process_description]

schema_name = Aktor-Pipeline Schema
#model_schema_data = C:/MyData/enviroments/python/process_this/workflow_python_flutter/03_model
model_schema_data = C:/MyData/enviroments/skills/bpmn-modeling-light/references

#data_file = workflow_python_flutter/03_model/process_model.md
data_file = C:/MyData/enviroments/bpmn-models/python-flutter-dev-pipeline/python-flutter-dev-pipeline.md


actor_cores_dir = workflow_python_flutter/01_actor_cores
actor_config_file = workflow_python_flutter/actor_config.md
data_object_config_file = workflow_python_flutter/data_object_config.md
model_token_limits_file = workflow_python_flutter/model_token_limits.md


[workflow_dirs]
base_dir = automa

[actor_outputs]
# Vaterverzeichnis im Projektverzeichnis fuer alle generierten Dokumente
base_dir = automa_generated

[dashboard]
# Auto-Refresh Intervall fuer das Haupt-Dashboard (in Millisekunden)
refresh_interval_ms = 20000
# Auto-Refresh Intervall fuer die Memory-/Token-Detail-Seiten (in Millisekunden)
detail_refresh_interval_ms = 10000

[dummy]
# UNUSED Dummy-Modus aktivieren: DummyActor statt Claude fuer service_task (Legacy)
# UNUSED enabled = false
# Happy-Path Context fuer ExclusiveGatewayActor im Dummy-Modus
# Format: key:value, key2:value2
happy_path_context = status:approved_with_changes, status:approved, status:compliant, status:no_gaps_found, status:success
# Output-Validierung ueberspringen (erlaubt Jobs ohne Output-Definition im BPMN)
#DEPRECATED # skip_output_validation = true

# --- Neue DB-basierte BPMN-Engine Dummy-Einstellungen ---
# Data Object Validierung: true = Input-Dateien muessen existieren, false = keine Pruefung
check_dataobjects = true
# Anzahl Dummy-Dateien bei Collection/Pattern (Multi-Instance)
default_collection_size = 2

[notification]
# E-Mail bei Abschluss des Hauptprozesses (Root-EndEvent erreicht)
notify_on_execution_complete = true
# E-Mail bei JEDEM EndEvent (auch SubProcess/CallActivity)
notify_on_all_end_events = false

[orchestrator]
# Git-Commit nach jedem abgeschlossenen Task (nicht Gateway/Event)
git_commit_enabled = true
# Commit-Message Template (verfuegbar: {job_id}, {element_name}, {element_id})
git_commit_message = Job {job_id}: {element_name}

